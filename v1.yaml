openapi: 3.1.1
info:
  title: MarketOurs.WebAPI | v1
  version: 1.0.0
servers:
  - url: http://localhost:5053/
paths:
  /Admin/overview:
    get:
      tags:
        - Admin
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfAdminOverviewDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfAdminOverviewDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfAdminOverviewDto"
  /Admin/users/{id}/status:
    put:
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserStatusRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/UpdateUserStatusRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/UpdateUserStatusRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
  /Auth/login:
    post:
      tags:
        - Auth
      summary: 标准账号密码登录
      requestBody:
        description: 包含账号、密码和设备类型的登录请求
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: 包含双 Token 的成功结果
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfTokenDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfTokenDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfTokenDto"
  /Auth/send-login-code:
    post:
      tags:
        - Auth
      summary: 发送登录验证码 (免密码登录)
      requestBody:
        description: 包含账号的请求对象
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendCodeRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/SendCodeRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/SendCodeRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /Auth/login-by-code:
    post:
      tags:
        - Auth
      summary: 使用验证码登录 (免密码登录)
      requestBody:
        description: 包含账号、验证码和设备类型的请求对象
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginByCodeRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/LoginByCodeRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/LoginByCodeRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfTokenDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfTokenDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfTokenDto"
  /Auth/register:
    post:
      tags:
        - Auth
      summary: 用户注册：第一步，提交信息获取注册令牌
      requestBody:
        description: 用户注册请求对象
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateDto"
          text/json:
            schema:
              $ref: "#/components/schemas/UserCreateDto"
          application/*+json:
            schema:
              $ref: "#/components/schemas/UserCreateDto"
        required: true
      responses:
        "200":
          description: 注册令牌
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfstring"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfstring"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfstring"
  /Auth/send-registration-code:
    post:
      tags:
        - Auth
      summary: 用户注册：第二步，发送验证码
      parameters:
        - name: regToken
          in: query
          description: 注册令牌
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /Auth/verify-registration:
    post:
      tags:
        - Auth
      summary: 用户注册：第三步，验证并完成注册
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRegistrationRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/VerifyRegistrationRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/VerifyRegistrationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
  /Auth/refresh:
    post:
      tags:
        - Auth
      summary: 使用刷新令牌获取新的访问令牌
      requestBody:
        description: 包含刷新令牌的请求对象
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
        required: true
      responses:
        "200":
          description: 新签发的令牌对
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfTokenDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfTokenDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfTokenDto"
  /Auth/logout:
    post:
      tags:
        - Auth
      summary: 注销当前会话 (需要登录)
      parameters:
        - name: deviceType
          in: query
          description: 设备类型 (Web/Mobile)
          schema:
            type: string
            default: Web
      responses:
        "200":
          description: 操作结果描述
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /Auth/info:
    get:
      tags:
        - Auth
      summary: 获取当前已登录用户的详细信息
      responses:
        "200":
          description: 当前用户信息
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
  /Auth/verify-email:
    get:
      tags:
        - Auth
      summary: 验证邮箱激活令牌
      parameters:
        - name: token
          in: query
          description: 注册时需要的验证内容
          schema:
            type: string
        - name: code
          in: query
          description: 邮件中的验证令牌
          schema:
            type: string
      responses:
        "200":
          description: 验证结果描述
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /Auth/verify-phone:
    post:
      tags:
        - Auth
      summary: 验证手机激活码
      parameters:
        - name: token
          in: query
          description: 注册时需要的验证内容
          schema:
            type: string
        - name: code
          in: query
          description: 邮件中的验证令牌
          schema:
            type: string
      responses:
        "200":
          description: 验证结果描述
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /Auth/forgot-password:
    post:
      tags:
        - Auth
      summary: 忘记密码：根据账号发送重置验证码
      requestBody:
        description: 包含账号的请求对象
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
        required: true
      responses:
        "200":
          description: 操作结果描述
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /Auth/reset-password:
    post:
      tags:
        - Auth
      summary: 重置密码：根据重置令牌设置新密码
      requestBody:
        description: 包含令牌和新密码的请求对象
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
        required: true
      responses:
        "200":
          description: 操作结果描述
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /Auth/resend-verification:
    post:
      tags:
        - Auth
      summary: 重新向未激活账户发送验证邮件或短信
      requestBody:
        description: 包含账号的请求对象
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
        required: true
      responses:
        "200":
          description: 操作结果描述
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /Auth/send-email-code:
    post:
      tags:
        - Auth
      summary: 向当前登录用户的邮箱发送验证码
      responses:
        "200":
          description: 操作结果描述
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /Auth/send-phone-code:
    post:
      tags:
        - Auth
      summary: 向当前登录用户的手机号发送验证码
      responses:
        "200":
          description: 操作结果描述
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /Auth/verify-email-code:
    post:
      tags:
        - Auth
      summary: 校验当前登录用户的邮箱验证码
      requestBody:
        description: 包含验证码的请求对象
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCodeRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/VerifyCodeRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/VerifyCodeRequest"
        required: true
      responses:
        "200":
          description: 操作结果描述
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /Auth/external-login:
    get:
      tags:
        - Auth
      summary: 第三方登录/绑定统一入口
      parameters:
        - name: provider
          in: query
          description: 登录提供方 (如 GitHub, Google, Weixin)
          schema:
            type: string
        - name: returnUrl
          in: query
          description: 登录成功后的回跳地址
          schema:
            type: string
            default: /
        - name: purpose
          in: query
          description: "用途: login 或 bind"
          schema:
            type: string
            default: login
      responses:
        "200":
          description: 跳转至第三方平台的 Challenge 响应
  /Auth/external-login-callback:
    get:
      tags:
        - Auth
      summary: 第三方登录成功后的内部回调处理
      parameters:
        - name: returnUrl
          in: query
          description: 最终回跳地址
          schema:
            type: string
            default: /
        - name: remoteError
          in: query
          description: 远程错误信息 (如有)
          schema:
            type: string
      responses:
        "200":
          description: 重定向至前端页面，并带上 AccessToken
  /clean:
    get:
      tags:
        - Cache
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfstring"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfstring"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfstring"
  /Comment:
    get:
      tags:
        - Comment
      summary: 获取所有评论 (分页)
      parameters:
        - name: PageIndex
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
        - name: PageSize
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
        - name: Keyword
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 分页后的评论列表
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfPagedResultDtoOfCommentDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfPagedResultDtoOfCommentDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfPagedResultDtoOfCommentDto"
    post:
      tags:
        - Comment
      summary: 创建新评论 (主评论，不带 ParentId)
      requestBody:
        description: 评论创建请求对象
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateDto"
          text/json:
            schema:
              $ref: "#/components/schemas/CommentCreateDto"
          application/*+json:
            schema:
              $ref: "#/components/schemas/CommentCreateDto"
        required: true
      responses:
        "200":
          description: 创建成功的评论数据
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
  /Comment/search:
    get:
      tags:
        - Comment
      summary: 全文检索评论内容 (分页)
      parameters:
        - name: PageIndex
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
        - name: PageSize
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
        - name: Keyword
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 相关评论分页列表
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfPagedResultDtoOfCommentDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfPagedResultDtoOfCommentDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfPagedResultDtoOfCommentDto"
  /Comment/{id}:
    get:
      tags:
        - Comment
      summary: 根据 ID 获取单个评论详情
      parameters:
        - name: id
          in: path
          description: 评论唯一标识
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 评论详细数据
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
    put:
      tags:
        - Comment
      summary: 更新评论内容 (仅限作者或管理员)
      parameters:
        - name: id
          in: path
          description: 评论 ID
          required: true
          schema:
            type: string
      requestBody:
        description: 评论更新请求对象
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentUpdateDto"
          text/json:
            schema:
              $ref: "#/components/schemas/CommentUpdateDto"
          application/*+json:
            schema:
              $ref: "#/components/schemas/CommentUpdateDto"
        required: true
      responses:
        "200":
          description: 更新后的评论数据
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
    delete:
      tags:
        - Comment
      summary: 删除评论 (仅限作者或管理员)
      parameters:
        - name: id
          in: path
          description: 评论 ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 操作结果描述
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /Comment/{id}/reply:
    post:
      tags:
        - Comment
      summary: 回复现有评论
      parameters:
        - name: id
          in: path
          description: 被回复的父评论 ID
          required: true
          schema:
            type: string
      requestBody:
        description: 评论创建请求对象
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateDto"
          text/json:
            schema:
              $ref: "#/components/schemas/CommentCreateDto"
          application/*+json:
            schema:
              $ref: "#/components/schemas/CommentCreateDto"
        required: true
      responses:
        "200":
          description: 创建成功的回复评论数据
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
  /Comment/{id}/like:
    post:
      tags:
        - Comment
      summary: 点赞评论 (支持切换状态)
      parameters:
        - name: id
          in: path
          description: 评论 ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 操作结果描述
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /Comment/{id}/dislike:
    post:
      tags:
        - Comment
      summary: 点踩评论 (支持切换状态)
      parameters:
        - name: id
          in: path
          description: 评论 ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 操作结果描述
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /Comment/{id}/review:
    put:
      tags:
        - Comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentReviewRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentReviewRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/UpdateCommentReviewRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfCommentDto"
  /File/upload/image:
    post:
      tags:
        - File
      summary: 上传单张图片 (限制为 jpg, png, gif, webp)
