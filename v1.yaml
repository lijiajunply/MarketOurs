            schema:
              $ref: "#/components/schemas/UserCreateDto"
          text/json:
            schema:
              $ref: "#/components/schemas/UserCreateDto"
          application/*+json:
            schema:
              $ref: "#/components/schemas/UserCreateDto"
        required: true
      responses:
        "200":
          description: 创建成功的用户数据
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
  /User/search:
    get:
      tags:
        - User
      summary: 根据关键词检索用户 (仅限管理员，支持分页)
      parameters:
        - name: PageIndex
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
        - name: PageSize
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
        - name: Keyword
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 匹配的用户分页列表
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfPagedResultDtoOfUserDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfPagedResultDtoOfUserDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfPagedResultDtoOfUserDto"
  /User/{id}:
    get:
      tags:
        - User
      summary: 根据用户 ID 获取详情 (仅限管理员)
      parameters:
        - name: id
          in: path
          description: 用户唯一标识
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 用户详细数据
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
    put:
      tags:
        - User
      summary: 更新指定用户的信息 (仅限管理员)
      parameters:
        - name: id
          in: path
          description: 目标用户 ID
          required: true
          schema:
            type: string
      requestBody:
        description: 用户信息更新请求对象
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateDto"
          text/json:
            schema:
              $ref: "#/components/schemas/UserUpdateDto"
          application/*+json:
            schema:
              $ref: "#/components/schemas/UserUpdateDto"
        required: true
      responses:
        "200":
          description: 更新后的用户数据
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfUserDto"
    delete:
      tags:
        - User
      summary: 删除指定用户 (仅限管理员，且不能删除自己)
      parameters:
        - name: id
          in: path
          description: 目标用户 ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 操作结果描述
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /User/public/{id}:
    get:
      tags:
        - User
