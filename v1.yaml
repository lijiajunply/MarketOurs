  /Logs:
    get:
      tags:
        - Logs
      summary: 获取最近的日志条目，支持分页和多条件搜索
      description: |-
        此API提供了三种搜索模式，可以单独使用或组合使用：
        1. 名称/内容搜索：通过关键词在日志消息和属性中进行模糊匹配
        2. 日志级别过滤：精确匹配指定的日志级别
        3. 时间范围过滤：支持"today"（当天）或指定天数（如"7"表示最近7天）

        所有搜索条件之间使用AND逻辑进行组合。
      parameters:
        - name: pageIndex
          in: query
          description: 页码，从1开始，默认为1
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
            default: 1
        - name: pageSize
          in: query
          description: 每页记录数，默认为10，最大不超过100
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
            default: 10
        - name: searchTerm
          in: query
          description: 搜索关键词，用于在日志消息和属性中搜索（最多100个字符）
          schema:
            type: string
        - name: levelFilter
          in: query
          description: 日志级别过滤，如"Information"、"Warning"、"Error"等
          schema:
            type: string
        - name: timeRange
          in: query
          description: 时间范围过滤："today"表示当天，或正整数表示最近几天
          schema:
            type: string
      responses:
        "200":
          description: 包含分页信息和日志条目的JSON响应
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfPaginatedResponseOfLogEntry"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfPaginatedResponseOfLogEntry"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfPaginatedResponseOfLogEntry"
  /Logs/statistics:
    get:
      tags:
        - Logs
      summary: 获取日志统计信息，包括总日志数量和各日志级别数量
      responses:
        "200":
          description: 日志统计结果
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ApiResponseOfLogStatistics"
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfLogStatistics"
            text/json:
              schema:
                $ref: "#/components/schemas/ApiResponseOfLogStatistics"
