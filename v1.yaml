    post:
      tags:
        - Logs
      summary: 手动清理旧日志
      parameters:
        - name: days
          in: query
          description: 要保留的日志天数，默认为7天
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
